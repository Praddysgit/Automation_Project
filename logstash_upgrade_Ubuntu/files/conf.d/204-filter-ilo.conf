filter {
  if [type] == "ilo" {
    mutate { 
      add_field => {"[data_stream][namespace]" => "ilo" }
      add_field => {"[label][[device][type]]" => "ilo" }
      remove_field => "[message]"
      add_tag => "ilo_grok_main"
    }

    grok {
      match => {
        "[event][original]" => [
        "<%{NONNEGINT:syslog_pri}>(?:|[0-9]+)%{SPACE}(?:%{TIMESTAMP_ISO8601:syslog_timestamp}|(?<syslog_timestamp>[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}\s%{TIME}))%{SPACE}(?<[host][name]>%{IP}|[A-Za-z0-9_\-.]+)%{SPACE}(?:#|)(?:(?<[event][provider]>[a-zA-Z#]+\s[0-9])|(?<[event][provider]>[a-zA-Z0-9#]+))(?:\:\s%{GREEDYDATA:message}|%{SPACE}(?:[\-\s]+|)%{SPACE}%{GREEDYDATA:message})",
        "<%{NONNEGINT:syslog_pri}>(?:|[0-9]+)%{SPACE}(?:%{TIMESTAMP_ISO8601:syslog_timestamp}|(?<syslog_timestamp>[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}\s%{TIME}))%{SPACE}(?<[host][name]>%{IP}|[A-Za-z0-9_\-.]+)%{SPACE}(?:#|)(?:(?<[event][provider]>[a-zA-Z#]+\s[0-9])|(?<[event][provider]>[a-zA-Z0-9#]+))(?:\:\s%{GREEDYDATA:message}|%{SPACE}(?:[\-\s]+|)%{SPACE}%{GREEDYDATA:message})",
        "<%{NONNEGINT:syslog_pri}>%{INT}%{SPACE}%{TIMESTAMP_ISO8601:syslog_timestamp}%{SPACE}%{HOSTNAME:[host][name]}%{SPACE}(#%{DATA:[device][type]}|%{DATA:[device][type]})%{SPACE}\-%{SPACE}\-%{SPACE}\-%{SPACE}((%{GREEDYDATA:event_action}\.%{SPACE}%{WORD:event_category}\:%{SPACE}%{GREEDYDATA:message})|(%{DATA:event_category}%{SPACE}\-%{SPACE}%{GREEDYDATA:event_action})|(%{GREEDYDATA:event_action}\:%{SPACE}\ %{GREEDYDATA:[user][name]})|(%{GREEDYDATA:message}\.))",
        "<%{NONNEGINT:syslog_pri}>%{INT}%{SPACE}\-%{SPACE}%{HOSTNAME:[host][name]}%{SPACE}(#%{DATA:[device][type]}|%{DATA:[device][type]})%{SPACE}\-%{SPACE}\-%{SPACE}\-%{SPACE}%{GREEDYDATA:message}\.",
########## newest logic ##########
        "<%{INT:syslog_priority}>%{SYSLOGTIMESTAMP:syslog_timestamp}%{SPACE}%{HOSTNAME:[host][name]}%{SPACE}%{DATA:[log][type]}%{SPACE}%{TIMESTAMP_ISO8601:[event][timestamp]}%{SPACE}%{WORD:[time][zone]},%{WORD:[event][category]},,(?:%{WORD:[source][host]})?,%{USERNAME:[user][name]},(?:%{DATA:[session][id]})?,(?:%{URIPATH:[task][id]})?,(?:%{IP:[source][ip]})?,%{WORD:[event][outcome]},%{WORD:[event][action]},%{WORD:[event][severity]},%{WORD:[resource][type]},(?:%{URIPATH:[resource][uri]})?,%{GREEDYDATA:message}"
        ]
      }
    }
    if [message] =~ / login[:\s]/ {
      mutate {
        replace => { "[event][action]" => "user_login"
        add_tag => "ilo_grok_2" }
        add_field => {
          "[event][category]" => "authentication"
          "[event][kind]" => "event"
          "[event][type]" => "start"
        }
      }
      if "login failure" in [message] {
        mutate { add_tag => "ilo_grok_3" }
        grok {
          match => {
            "message" => [
               "(?<[network][application]>\S+)\s+login\s+failure\s+from:\s+(?:%{IP:[client][ip]}|%{HOSTNAME:[client][domain]})"
            ]
          }
          add_field => { "[event][outcome]" => "failure" }
        }
      }
      else if "unauthorized login attempts" in [message] {
        mutate { add_field => { "[event][outcome]" => "failure" } }
      }
    }
  }  
}
