filter {
  if [type] == "rsyslog" {
    mutate {
    add_field => { "[event][category]" => "rsyslog"}
    }

   grok {
    match => {
      "[event][original]" => ["<%{NONNEGINT:level}>%{NONNEGINT:version}%{SPACE}(?:-|%{TIMESTAMP_ISO8601:syslog_timestamp})%{SPACE}(?:-|%{IPORHOST:hostname})%{SPACE}(?:%{SYSLOG5424PRINTASCII}|-)%{SPACE}(?:-|%{SYSLOG5424PRINTASCII})%{SPACE}(?:-|%{SYSLOG5424PRINTASCII})%{SPACE}(?:-|(\[.*?[^\\]\])+)%{SPACE}%{GREEDYDATA:message}" ]
     }
   }
  }
 }

