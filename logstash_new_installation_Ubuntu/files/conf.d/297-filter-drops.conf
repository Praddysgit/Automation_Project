filter {
  if [event][provider] == "Hostd" or [event][provider] == "VVold" or [event][provider] == "Vpxa" or [event][provider] == "Rhttpproxy" or [event][provider] == "Fdm" or [event][provider] == "osfsd" or [event][provider] == "vmkwarning" or [event][provider] == "vmkernel" or [event][provider] == "localcli" or [event][provider] == "Hostd" or [event][provider] == "storageRM" {
     drop {}
  }

#  if [label][device_type] == "esxi_host" and ![syslog_timestamp] {
#    drop{}
#  }

  if [label][device_type] == "esxi_host" and "backup.sh" in [event][original] {
    drop{}
  }

  if [type] == 'kms' and ',"state":"off",' in [event][original] {
    drop{}
  }

}