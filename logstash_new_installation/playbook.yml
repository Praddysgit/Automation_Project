---
- name: Logstash New Deployment
  hosts: localhost
  become: yes
  gather_facts: yes
  vars:
    rpm_path: "/tmp/logstash-*.rpm"
    conf_src: "files/conf.d"
    conf_dest: "/etc/logstash/conf.d"
    deployment_type: "{{ deployment_type }}"
    client_name: "{{ client_name }}"

  tasks:
    - name: Check if Logstash already installed
      stat:
        path: "{{ item }}"
      loop:
        - /usr/share/logstash
        - /etc/logstash
        - /usr/lib/systemd/system/logstash.service
      register: logstash_check
      loop_control:
        label: "{{ item }}"

    - name: Abort if Logstash already installed
      fail:
        msg: "Logstash already installed (found {{ item.item }}). Aborting deployment."
      when: item.stat.exists
      loop: "{{ logstash_check.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Set namespace and dataset
      set_fact:
        namespace: "{{ client_name }}"
        dataset: >-
          {% if deployment_type == 'ITOC' %}itoc
          {% elif deployment_type == 'CLIENT' %}client
          {% elif deployment_type == 'SMB' %}smb
          {% else %}unknown
          {% endif %}

    - name: Find downloaded Logstash RPM
      find:
        paths: /tmp
        patterns: "logstash-*.rpm"
      register: logstash_rpm

    - name: Abort if RPM not found
      fail:
        msg: "No Logstash RPM found in /tmp. Cannot proceed."
      when: logstash_rpm.files | length == 0

    - name: Install Logstash RPM
      dnf:
        name: "{{ logstash_rpm.files[0].path }}"
        state: present
        disable_gpg_check: no

    - name: Ensure config directory exists
      file:
        path: "{{ conf_dest }}"
        state: directory
        owner: logstash
        group: logstash
        mode: '0755'

    - name: Find all config files
      find:
        paths: "{{ conf_src }}"
        patterns: "*.conf"
        excludes:
          - "100-input.conf"
          - "400-output.conf"
      register: static_configs
      delegate_to: localhost

    - name: Copy static config files (no modification needed)
      copy:
        src: "{{ item.path }}"
        dest: "{{ conf_dest }}/{{ item.path | basename }}"
        owner: logstash
        group: logstash
        mode: '0644'
      loop: "{{ static_configs.files }}"

    - name: Deploy 100.conf with client name replacement
      template:
        src: "{{ conf_src }}/100-input.conf"
        dest: "{{ conf_dest }}/100-input.conf"
        owner: logstash
        group: logstash
        mode: '0644'
      vars:
        datacenter_clientname: "{{ client_name }}"

    - name: Deploy 400.conf with namespace and dataset
      template:
        src: "{{ conf_src }}/400-output.conf"
        dest: "{{ conf_dest }}/400-output.conf"
        owner: logstash
        group: logstash
        mode: '0644'
      vars:
        data_stream_namespace: "{{ namespace }}"
        data_stream_dataset: "{{ dataset | trim }}"

    - name: Enable Logstash
      systemd:
        name: logstash
        enabled: yes

    - name: Start Logstash
      systemd:
        name: logstash
        state: started

    - name: Check Logstash status
      systemd: 
        name: logstash
      register: logstash_status

    - name: Display Logstash Active State
      debug:
        msg: "Logstash service is {{ logstash_status.status.ActiveState }}"

    - name: Get logs on failure
      command: journalctl -u logstash -n 20 --no-pager
      register: logstash_logs
      when: logstash_status.status.ActiveState != "active"          