######## Example events for handling PMP logs from syslog
#
#UserAudit:admin:127.0.0.1 User_Logged_Out 2021/02/03 13:16:16 Success pmp_test admin:N/A
#ResourceAudit:admin:127.0.0.1 Account_Added 2022/05/05 10:24:24 Success pmp_test windows-server-1:account1:Testing
#

filter {
  if [type] == "pmp" {
    grok {
      match => {
        "[event][original]" => [
        "\<%{NONNEGINT:syslog_level}\>%{SYSLOGTIMESTAMP:syslog_timestamp}%{SPACE}%{IPORHOST:[pmp][host][name]}%{SPACE}%{USERNAME:[pmp][log][type]}\:%{DATA:[pmp][user][name]}\:(%{IP:[pmp][source][ip]}|%{HOSTNAME:[pmp][source][name]})%{SPACE}%{DATA:[pmp][event][action]}%{SPACE}(?<[pmp][time][logged]>%{YEAR}\/%{MONTHNUM}\/%{MONTHDAY}%{SPACE}%{TIME})%{SPACE}%{WORD:[pmp][event][outcome]}%{SPACE}%{GREEDYDATA:info}"
        ]
      }
    }
    mutate {
      add_field => { "[event][category]" => "pmp"}
    }

    if [pmp][log][type] == "ResourceAudit" {
      grok {
        match => {
          "[info]" => [
          "%{HOSTNAME}%{SPACE}%{DATA:[pmp][target][host]}\:%{DATA:[pmp][target][account]}\:%{DATA}\:%{GREEDYDATA:[pmp][message]}"
          ]
        }
      }
      mutate {
        add_field => { "[label][device_type]" => "pmp-resource-audit"}
        remove_field => ["info"]
        add_tag => "pmp_grok_resource"
        gsub => [
          "[pmp][message]", "_", " ",
          "[pmp][event][action]", "_", " "
        ]
      }
    }
    
    if [pmp][log][type] == "UserAudit" {
      grok {
        match => {
          "[info]" => [
          "%{HOSTNAME:[pmp][target][host]}%{SPACE}%{DATA:[pmp][target][user]}\:%{GREEDYDATA:[pmp][event][reason]}"
          ]
        }       
      }
      mutate { 
        add_field => { "[label][device_type]" => "pmp-user-audit"}
        remove_field => ["info"]
        add_tag => "pmp_grok_user" 
        gsub => [
          "[pmp][event][action]", "_", " ",
          "[pmp][event][reason]", "_", " "
        ]
      }
    }
  }
}
