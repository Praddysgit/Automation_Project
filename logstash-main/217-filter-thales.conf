filter {
  if ([type] == "thales" or [type] == "pmp") and [event][original] =~ "tknode00\d" {
    mutate {
      add_tag => "thales"
    }
    grok {
      match => {
        "[event][original]" => 
        [
          # first possible GROK. The log can end with or without '"]'.
          "<%{INT:[syslog][priority]}>%{SYSLOGTIMESTAMP:[syslog][timestamp]}\s%{DATA:[host][id]}\sCipherTrust:\s<%{INT:[priority]}>%{INT:[syslog][version]}\s%{TIMESTAMP_ISO8601:[event][created]}\snil\s%{DATA:[service][name]}\s-\s%{UUID:[event][id]}\s\[msg=\"%{DATA:[event][action]}\"\ssev=\"%{NUMBER:[event][severity]}\"\sdetails=\"%{DATA:[event][details]}\s\(%{DATA:info}\)(\"\])?",
          # second GROK is prepared for logs that are cut in the end. There is no visual end of the log like ')', '}' or ']'
          "<%{INT:[syslog][priority]}>%{SYSLOGTIMESTAMP:[syslog][timestamp]}\s%{DATA:[host][id]}\sCipherTrust:\s<%{INT:[priority]}>%{INT:[syslog][version]}\s%{TIMESTAMP_ISO8601:[event][created]}\snil\s%{DATA:[service][name]}\s-\s%{UUID:[event][id]}\s\[msg=\"%{DATA:[event][action]}\"\ssev=\"%{NUMBER:[event][severity]}\"\sdetails=\"%{DATA:[event][details]}\s\(%{GREEDYDATA:info}"
          #" #this is quote is placed as comment because second GROK creates a pattern issue for VS Code. Even without this line GROK pattern will work 
          # after these first GROK patterns we will be left with [info] field which is very big (has a lot of data) and needs to be parsed separately  
        ]
      }
    }
  }
  if "thales" in [tags] {
    grok {
      match => {
        "[info]" => 
        [
          # the big [info] field is divided and parsed below. Every new field is placed in brackets with question mark in the end. This means that the field could and could not exist.
          "{(\"client_ip\":\"(%{IP:[client][ip]})?\",)?(\"createdAt\":\"(%{TIMESTAMP_ISO8601:[created][at]})?\",)?(\"details\":{(\"Username\":(\"%{DATA:[user][name]}\")?,)?(\"userId\":(\"%{DATA:[user][id]}\")?)?(\"auth_domain\":\"(%{HOSTNAME:[details][auth][domain]})?\",)?(\"client_id\":\"(%{DATA:[details][client][id]})?\",)?(\"client_name\":(%{USERNAME:[details][client][name]})?,)?(\"client_type\":\"(%{DATA:[details][client][type]})?\",)?(\"connection\":\"(%{DATA:[details][connection]})?\",)?(\"domain\":\"(%{DATA:[details][domain]})?\",)?(\"domain_id\":\"(%{DATA:[details][domain][id]})?\",)?(\"grant_type\":\"(%{DATA:[details][grant][type]})?\",)?(\"refresh_token_counts\":{(\"labels\":{},)?(\"no_label\":(%{INT:[details][token][no][label]})?,)?(\"total\":(%{INT:[details][token][total]})?)?},)?(\"refresh_token_id\":\"(%{DATA:[details][refresh][token][id]})?\",)?(\"renew_refresh_token\":(%{DATA:[details][renew][refresh][token]})?,)?(\"user_id\":\"(%{DATA:[details][user][id]})?\",)?(\"username\":\"(%{USERNAME:[details][user][name]})?\")?},)?(\"domain_id\":\"(%{DATA:[domain][id]})?\",)?(\"message\":\"(%{DATA:message})?\",)?(\"proxy_ip\":\"(%{IP:[proxy][ip]})??\",)?(\"service\":\"(%{DATA:service})?\",)?(\"service_name\":\"(%{DATA:[service][name]})?\",)?(\"severity\":(%{DATA:severity})?,)?(\"source\":\"(%{HOSTNAME:source})?\",)?(\"success\":(%{DATA:outcome})?,)?(\"username\":\"(%{USERNAME:[user][name]})?\")?}?"
        ]
      }
    }
    mutate { remove_field => "[info]" }
  }
  # in every log inside the [event][details] field we can find "succeeded" or "failed". That's why create new field [event][outcome] depending on this information.
  if [event][details] =~ "succeeded" {
    mutate {
      add_field => { 
        "[event][outcome]" => "success"
      }
    }
  } else if [event][details] =~ "failed" {
    mutate {
      add_field => { 
        "[event][outcome]" => "failure"
      }
    }
  }
}
