filter {
  if "vigem" in [tags] {
    mutate {
      add_field => {"[data_stream][namespace]" => "vigem" }
      rename => [ "[beat][hostname]", "[host][hostname]" ]
      rename => [ "[beat][name]", "[host][name]" ]
      copy => [ "[host][name]", "[agent][name]" ]
      rename => [ "[beat][version]", "[agent][version]" ]
      rename => [ "source", "[log][file][path]" ]
    }
  }
}

