filter {
  if [type] == "openshift" {
    mutate {
    add_field => { "[event][category]" => "openshift"}
    }

  grok {
   match => {
    "[event][original]" => [
      "<%{POSINT:syslog_pri}>%{POSINT} %{TIMESTAMP_ISO8601:syslog_timestamp} %{HOSTNAME:hostname} %{DATA} %{DATA} %{DATA} (?<openshift_payload>\{.*\})" 
    ]
   }
  }

  json {
    source => "openshift_payload"
    target => "openshift"
  }

  mutate {
    rename =>  {"openshift_payload" => "[event][original]"}
    remove_field => "message"
   }
 }
}
