filter {
  if [type] == "application"  {
    mutate {
      add_field => {"[data_stream][namespace]" => "application" }
      add_field => { "[label][device_type]" => "synergy"}
    }
    # match synergy oneview devices by hostname regex
    if [event][original] =~ /<device_name_regex>/ and [type] == "application" {
      mutate {
        add_field => { "[label][device_type]" => "synergy"}
      }
    }
  }

  ##################### SYNERGY ######################
  if [label][device_type] == "synergy" {
    # synergy grok
    mutate { add_tag => "synergy_grok" }
    grok {
      match => {
        "[event][original]" => [
        "<%{NONNEGINT:level}>(?:-|%{SYSLOGTIMESTAMP})%{SPACE}(?<hostname>%{IP}|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|%{HOSTNAME})%{SPACE}(?<[event][dataset]>[a-zA-Z0-9_-]+)%{SPACE}(?<syslog_timestamp>\d+\-\d+\-\d+\s\d{2}\:\d{2}\:\d{2}\.\d{3})%{SPACE}\w{3},(?<[event][category]>Authentication),,(?<[user][domain]>[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9._-]+),%{USERNAME:[user][name]},,,%{IP:[client][ip]},%{WORD:[event][outcome]},(?<[event][type]>LOGIN),%{LOGLEVEL},%{WORD},,%{GREEDYDATA:message}.\s\[logID\s\"(?<session.id>[a-zA-Z0-9]+)\"",
        "<%{NONNEGINT:level}>(?:-|%{SYSLOGTIMESTAMP})%{SPACE}(?<hostname>%{IP}|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|%{HOSTNAME})%{SPACE}(?<[event][dataset]>[a-zA-Z0-9_-]+)%{SPACE}(?<syslog_timestamp>\d+\-\d+\-\d+\s\d{2}\:\d{2}\:\d{2}\.\d{3})%{SPACE}\w{3},(?<[event][category]>Authentication),,(?<[user][domain]>[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9._-]+),%{USERNAME:[user][name]},,,%{IP:[client][ip]},%{WORD:[event][outcome]},(?<[event][type]>LOGIN),%{LOGLEVEL},%{WORD},,%{GREEDYDATA:message}",
        "<%{NONNEGINT:level}>(?:-|%{SYSLOGTIMESTAMP})%{SPACE}(?<hostname>%{IP}|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|%{HOSTNAME})%{SPACE}(?<[event][dataset]>[a-zA-Z0-9_-]+)%{SPACE}(?<syslog_timestamp>\d+\-\d+\-\d+\s\d{2}\:\d{2}\:\d{2}\.\d{3})%{SPACE}\w{3},(?<[event][category]>security),,(?<[user][domain]>[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9._-]+),%{USERNAME:[user][name]},,,%{IP:[client][ip]},%{WORD:[event][outcome]},(?<[event][type]>MODIFY),%{LOGLEVEL},%{WORD},,%{GREEDYDATA:message}",
        "<%{NONNEGINT:level}>(?:-|%{SYSLOGTIMESTAMP})%{SPACE}(?<hostname>%{IP}|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|%{HOSTNAME})%{SPACE}(?<[event][dataset]>[a-zA-Z0-9_-]+)%{SPACE}(?<syslog_timestamp>\d+\-\d+\-\d+\s\d{2}\:\d{2}\:\d{2}\.\d{3})%{SPACE}\w{3},(?<[event][category]>security),,(?<[user][domain]>[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9._-]+),%{USERNAME:[user][name]},,,%{IP:[client][ip]},%{WORD:[event][outcome]},(?<[event][type]>MODIFY),%{LOGLEVEL},%{WORD},,%{GREEDYDATA:message}",
        "<%{NONNEGINT:level}>(?:-|%{SYSLOGTIMESTAMP})%{SPACE}(?<hostname>%{IP}|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|%{HOSTNAME})%{SPACE}(?<[event][dataset]>[a-zA-Z0-9_-]+)%{SPACE}(?<syslog_timestamp>\d+\-\d+\-\d+\s\d{2}\:\d{2}\:\d{2}\.\d{3})%{SPACE}\w{3},(?<[event][category]>Authentication),,(?<[user][domain]>[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9._-]+),%{USERNAME:[user][name]},,,(?:,|%{IP:[client][ip]})%{WORD:[event][outcome]},(?<[event][type]>LOGOUT),%{LOGLEVEL},%{WORD},,%{GREEDYDATA:message}",
        "<%{NONNEGINT:level}>(?:-|%{SYSLOGTIMESTAMP})%{SPACE}(?<hostname>%{IP}|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|%{HOSTNAME})%{SPACE}(?<[event][dataset]>[a-zA-Z0-9_-]+)%{SPACE}(?<syslog_timestamp>\d+\-\d+\-\d+\s\d{2}\:\d{2}\:\d{2}\.\d{3})%{SPACE}\w{3},%{WORD:[event][category]},,(?<[user][domain]>[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9._-]+),%{USERNAME:[user][name]},%{GREEDYDATA:message}",
        "<%{NONNEGINT:level}>(?:-|%{SYSLOGTIMESTAMP})%{SPACE}(?<hostname>%{IP}|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|%{HOSTNAME})%{SPACE}(?<[event][dataset]>[a-zA-Z0-9_-]+)%{SPACE}(?<syslog_timestamp>\d+\-\d+\-\d+\s\d{2}\:\d{2}\:\d{2}\.\d{3})%{SPACE}\w{3},%{GREEDYDATA:message}"
        ]
      }
    }
  }  
}
