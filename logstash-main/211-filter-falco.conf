filter {
  if [type] == "falco" {
    mutate {
    add_field => { "[event][category]" => "falco"}
    }
      grok {
        match => {
          "[event][original]" => [  "<%{NONNEGINT:syslog_level}>%{SYSLOGTIMESTAMP:syslog_timestamp}%{SPACE}%{SYSLOGHOST:[host][name]}%{SPACE}%{PROG:[event][module]}\[%{INT:syslog_pid}\]:%{SPACE}%{TIME:syslog_time}:%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}%{GREEDYDATA:data}"
          ]
     }
    }
  }
}
