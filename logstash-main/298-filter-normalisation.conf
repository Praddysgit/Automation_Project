filter {

  ########################## LOGIN/LOGOUT DETECTION START ##########################
  if [event][original] =~ /[Ll][oO][gG][iI][nN]/ {
    if ![event][action] and ![event][category] and ![event][kind] and ![event][type] and ![event][outcome] {
      mutate {
        add_field => {
          "[event][action]" => "user_login"
          "[event][category]" => "authentication"
          "[event][kind]" => "event"
          "[event][type]" => "start"
        }
      }
    }
    if [event][original] =~ /[Ll][oO][gG][iI][nN]*[fF][aA][iI][lL]/ or "unauthorized" in [event][original] and ![event][outcome] {
      mutate {
        add_field => {
          "[event][outcome]" => "failure"
        }
      }
    }
    else {
      if ![event][outcome] {
        mutate {
          add_field => { "[event][outcome]" => "success" }
          replace => { "[event][action]" => "logged-in" }
        }
      }
    }
  }
  else if [event][original] =~ /[Ll][oO][gG][oO][uU][tT]/ {
    if ![event][action] and ![event][category] and ![event][kind] and ![event][type] and ![event][outcome] {
      mutate {
        add_field => {
          "[event][action]" => "logged-out"
          "[event][category]" => "authentication"
          "[event][kind]" => "event"
          "[event][type]" => "end"
          "[event][outcome]" => "success"
        }
      }
    }
  }
  ########################## LOGIN/LOGOUT DETECTION END ##########################

  ########################## DETECT FAIL EVENTS START ##########################
  if [event][original] =~ /[fF][aA][iI][lL]/ {
    mutate { add_field => { "[event][outcome]" => "failure" } }
  }
  ########################## DETECT FAIL EVENTS END ##########################

  ########################## NORMALISATION START ##########################
    if [event][outcome] =~ /[fF][aA][iI][lL]/  {
      mutate {
        replace => { "[event][outcome]" => "failure" }
      }
    }

  if ![event][action] {
    if [event][outcome] == "failure" and ([message] =~ /[Ll][oO][gG][iI][nN]/ or [event][type] == "access") {
      mutate { add_field => { "[event][action]" => "user_login" } }
      if ![event][category] {
        mutate { add_field => { "[event][category]" => "authentication" } }
      }
    }

    if [event][outcome] == "success" and ([message] =~ /[Ll][oO][gG][iI][nN]/ or [event][type] == "access")  {
      mutate { add_field => { "[event][action]" => "logged-in" } }
      if ![event][category] {
        mutate { add_field => { "[event][category]" => "authentication" } }
      }
    }
  }

    if [event][type] == "MODIFY" {
      mutate {
        replace => { "[event][type]" => "change" }
      }
    }

    if [event][type] == "GET" {
      mutate {
        rename => { "[event][type]" => "[http][request][method]" }
      }
    }

    if [event][type] == "DELETE" {
      mutate {
        replace => { "[event][type]" => "deletion" }
      }
    }

    if [event][category] =~ /[Aa][Uu][Tt][Hh][Ee][Nn][Tt][Ii][Cc][Aa][Tt][Ee]/ {
      mutate {
        replace => { "[event][category]" => "authentication" }
      }
    }

    if [event][category] == "REST_MONITOR" {
      mutate {
        replace => { "[event][category]" => "web" }
      }
    }

  ########################## NORMALISATION END ##########################

    ########################## LOWER CASE START ##############################

    if [event][outcome] {
      mutate { lowercase => [ "[event][outcome]" ] }
    }
    if [event][category] {
     mutate { lowercase => [ "[event][category]" ] }
    }
    if [event][type] {
      mutate { lowercase => [ "[event][type]" ] }
    }
    if [network][application] {
      mutate { lowercase => [ "[network][application]" ] }
    }
    ########################## LOWER CASE END ##############################

    #################### HOSTNAME AND HOST.NAME START #######################
    if [host][name] and ![hostname] {
      mutate {
        copy => { "[host][name]" => "hostname" }
      }
    } else if [hostname] and ![host][name] {
      mutate {
        copy => { "hostname" => "[host][name]" }
      }    
    }
    #################### HOSTNAME AND HOST.NAME END #########################
}
