filter {
  ##################### Date ###############################
  if [label][device_type] == "3par" {
    date {
      match => [ "syslog_timestamp", "ISO8601", "MMM dd HH:mm:ss", "MMM dd HH:mm:ss.SSS", "YYYY/MM/dd-HH:mm:ss", "EEE MMM d HH:mm:ss YYYY", "EEE MMM dd HH:mm:ss YYYY"  ]
      timezone => "Europe/Paris"
      target => "@timestamp"
      remove_field => "syslog_timestamp"
    }
  }

  if [label][device_type] == "storeonce" {
    date {
      match => [ "syslog_timestamp", "ISO8601", "MMM dd HH:mm:ss", "MMM dd HH:mm:ss.SSS", "YYYY/MM/dd-HH:mm:ss", "EEE MMM d HH:mm:ss YYYY", "EEE MMM dd HH:mm:ss YYYY"  ]
      timezone => "Europe/Paris"
      target => "@timestamp"
      remove_field => "syslog_timestamp"
    }
  }

  if [type] == "syslog" or [label][device_type] == "nimble" {
    date {
      match => [ "syslog_timestamp", "ISO8601", "MMM dd HH:mm:ss", "MMM dd HH:mm:ss.SSS", "YYYY/MM/dd-HH:mm:ss", "EEE MMM d HH:mm:ss YYYY", "EEE MMM dd HH:mm:ss YYYY"  ]
      timezone => "Europe/Paris"
      target => "@timestamp"
      remove_field => "syslog_timestamp"
    }
  }

  if [type] == "network" or [label][device_type] == "storeonce" or [label][device_type] == "qumulo" or [type] == "application" or [type] == "esxi" or [type] == "ilo" {
    date {
    match => [ "syslog_timestamp", "ISO8601", "MMM dd HH:mm:ss", "MMM dd HH:mm:ss.SSS", "YYYY/MM/dd-HH:mm:ss", "EEE MMM d HH:mm:ss YYYY", "EEE MMM dd HH:mm:ss YYYY", "YYYY-MM-dd HH:mm:ss"  ]
      target => "@timestamp"
      timezone => "UTC"
      remove_field => "syslog_timestamp"
    }
  }
}

