filter {
  if [type] == "esxi"  {
    mutate {
      add_field => { "[label][device_type]" => "esxi_host"}
      add_field => {"[data_stream][namespace]" => "esxi" }
    }
  }

##################### ESXI GROK ######################
### all ESXI logs will go troght this logic below so taht the message field will be separated and further processed
  if [label][device_type] == "esxi_host" {
    mutate { add_tag => "esxi_grok" }
    grok {
      match => {
        "[event][original]" => [
        "<%{NONNEGINT:level}>(?:-|%{TIMESTAMP_ISO8601:syslog_timestamp})%{SPACE}(?<hostname>%{IP}|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|%{HOSTNAME})%{SPACE}(?<[event][provider]>[A-Za-z0-9-_]+)(?:\[(?<[process][id]>[0-9]+)\]:|:)%{SPACE}%{GREEDYDATA:message}",
        "<%{NONNEGINT:level}>%{NONNEGINT:version}%{SPACE}%{TIMESTAMP_ISO8601:syslog_timestamp}%{SPACE}(?<hostname>%{IP}|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.\w+|%{HOSTNAME})%{SPACE}(?<[event][provider]>[A-Za-z0-9-_]+)([- ]+)%{SPACE}%{GREEDYDATA:message}"
        ]
      }
    }
  }

###new logic
  if [label][device_type] == "esxi_host" and [event][provider] == "envoy-access" {
    mutate { add_tag => "esxi_grok_3.1" }
    grok {
      match => {
        "message" => [	
        "(%{WORD:method}%{SPACE}%{NOTSPACE:[uri][path]}|\-%{SPACE}\-)%{SPACE}%{NUMBER:[status][code]}%{SPACE}%{DATA:[response][source]}%{SPACE}%{NOTSPACE:[response][message]}%{SPACE}%{NUMBER:[response][time]}%{SPACE}%{NUMBER:[response][bytes]}%{SPACE}%{NOTSPACE:[content][encoding]}%{SPACE}%{NUMBER:[connection][time]}%{SPACE}(%{NUMBER:[ssl][handshake_time]}|\-)%{SPACE}(%{NUMBER:[client][processing_time]}|\-)%{SPACE}%{IP:[client][ip]}\:%{NUMBER:[client][port]}%{SPACE}%{NOTSPACE:[protocol][version]}%{SPACE}%{NOTSPACE:[tls][version]}%{SPACE}%{IP:[server][ip]}\:%{NUMBER:[server][port]}%{SPACE}(%{IP:[upstream][ip]}:%{NUMBER:[upstream][port]}%{SPACE}%{NOTSPACE:[upstream][protocol_version]}|\-%{SPACE}\-%{SPACE}\-|\-)%{SPACE}%{NOTSPACE:[upstream][tls_version]}%{SPACE}(%{IP:[proxy][ip]}:%{NUMBER:[proxy][port]}%{SPACE}%{GREEDYDATA:[proxy][operation]}|\-%{SPACE}%{PATH:[proxy][path]}%{SPACE}\-%{SPACE}\-|\-%{SPACE}\-)",
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}envoy\[%{NUMBER:[process][id]}\]%{SPACE}\[%{DATA:[originator][name]}\@%{NUMBER}%{SPACE}sub\=%{DATA:subsystem}\]%{SPACE}\[%{TIMESTAMP_ISO8601:[request][timestamp]}\]%{SPACE}\"%{WORD:method}%{SPACE}%{URIPATHPARAM:request}%{SPACE}HTTP\/%{NUMBER:[http][version]}\"%{SPACE}%{NUMBER:[response][code]}%{SPACE}\-%{SPACE}%{NUMBER:[bytes][received]}%{SPACE}%{NUMBER:[bytes][sent]}%{SPACE}%{NUMBER:[duration][ms]}%{SPACE}\-%{SPACE}\"\-\"%{SPACE}\"%{DATA:[user][agent]}\"%{SPACE}\"\-\"%{SPACE}\"%{HOSTNAME:[upstream][host]}\"%{SPACE}\"\-\"",
        "<%{NONNEGINT:log.syslog.priority}>%{INT:log.syslog.version} %{TIMESTAMP_ISO8601:log.syslog.timestamp} %{HOSTNAME:host.name} %{WORD:process.name} - - - %{TIMESTAMP_ISO8601:log.vum.timestamp} - %{GREEDYDATA:message}",       
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}Section%{SPACE}for%{SPACE}%{DATA:[component][name]},%{SPACE}pid=%{NUMBER:pid},%{SPACE}version=%{DATA:verion},%{SPACE}build=%{NUMBER:[build][id]},%{SPACE}option=%{WORD:[build][option]}",        
        "%{DATA:app.name} - - - %{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:log.level} %{WORD:service_name}\[%{INT:envoy.pid}\] \[Originator@%{INT} sub=%{WORD:envoy.subsystem}\] %{GREEDYDATA:message}",
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}envoy\[%{NUMBER:[process][id]}\]%{SPACE}\[%{DATA:[originator][name]}\@%{NUMBER}%{SPACE}sub\=%{DATA:subsystem}\]%{SPACE}%{%GREEDYDATA:[esxi][template]}"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "etcd" {
    mutate { add_tag => "esxi_grok_3.2" }
    grok {
      match => {
        "message" => [	
        "start%{SPACE}time%{SPACE}=%{SPACE}%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{INT}%{SPACE}%{WORD:timezone}%{SPACE}m\=%{NUMBER:[monotonic][time]},%{SPACE}time%{SPACE}spent%{SPACE}=%{SPACE}%{NUMBER:[time][spent]}%{DATA:[time][unit]},%{SPACE}remote%{SPACE}=%{SPACE}%{IP:[remote][ip]}:%{NUMBER:[remote][port]},%{SPACE}response%{SPACE}type%{SPACE}=%{SPACE}%{DATA:[response][type]},%{SPACE}request%{SPACE}count%{SPACE}=%{SPACE}%{NUMBER:[request][count]},%{SPACE}request%{SPACE}size%{SPACE}=%{SPACE}%{NUMBER:[request][size]},%{SPACE}response%{SPACE}count%{SPACE}=%{SPACE}%{NUMBER:[response][count]},%{SPACE}response%{SPACE}size%{SPACE}=%{SPACE}%{NUMBER:[response][size]},%{SPACE}request%{SPACE}content%{SPACE}=%{GREEDYDATA:[request][content]}",
        "%{IP:[remote][ip]}:%{NUMBER:[remote][port]}",
        "%{GREEDYDATA:info}"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "backup-check" {
    mutate { add_tag => "esxi_grok_3.3" }
    grok {
      match => {
        "message" => [	
        "xmlfile\=\'%{DATA:xmlfile}\'%{SPACE}schemaId\=\'%{DATA:schemaId}\'",
        "%{DATA:schemaId}\:%{SPACE}xmlfile\=\'%{DATA:xmlfile}\'",
        "%{GREEDYDATA:message}"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "envoy" {
    mutate { add_tag => "esxi_grok_3.4" }
    grok {
      match => {
        "message" => [	
        "\"%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}%{WORD:[app][name]}\[%{NUMBER:pid}\]%{SPACE}\[Originator@%{NUMBER:[originator][id]}%{SPACE}sub=%{WORD:subsystem}\]%{SPACE}%{GREEDYDATA:info}\""
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "esxtokend" {
    mutate { add_tag => "esxi_grok_3.5" }
    grok {
      match => {
        "message" => [	
        "\[%{DATA:[originator][name]}@%{NUMBER:[originator][id]}%{SPACE}sub=%{DATA:subsystem}%{SPACE}opID=%{DATA:[operation][id]}%{SPACE}%{TIME:time}%{SPACE}%{NUMBER:plustime}%{SPACE}%{WORD:timezone}\]%{SPACE}%{GREEDYDATA:info};%{SPACE}<io_obj%{SPACE}p:%{DATA:[io][obj_p]},%{SPACE}h:%{NUMBER:[io][handle]},%{SPACE}<TCP%{SPACE}'%{IP:[source][ip]}%{SPACE}:%{SPACE}%{NUMBER:[source][port]}'>,%{SPACE}<TCP%{SPACE}'%{IP:[destination][ip]}%{SPACE}:%{SPACE}%{NUMBER:[destination][port]}'>>,%{SPACE}%{WORD:[exception][class]}\(%{GREEDYDATA:[exception][message]},%{SPACE}duration:%{SPACE}%{TIME:[duration][time]}%{SPACE}\(%{DATA:[duration][format]}\)\)",
        "\[%{DATA:[originator][name]}@%{NUMBER:[originator][id]}%{SPACE}sub=%{DATA:subsystem}%{SPACE}opID=%{DATA:[operation][id]}%{SPACE}%{TIME:time}%{SPACE}%{NUMBER:plustime}%{SPACE}%{WORD:timezone}\]%{SPACE}%{GREEDYDATA:info}",
        "\-\-\>%{SPACE}\[context\]%{DATA:[base64][message]}\[\/context\]"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "apiForwarder" {
    mutate { add_tag => "esxi_grok_3.6" }
    grok {
      match => {
        "message" => [	 
        "\[%{DATA:[originator][name]}@%{NUMBER:[originator][id]}%{SPACE}sub=%{DATA:subsystem}%{SPACE}opID=%{DATA:[operation][id]}%{SPACE}%{TIME:time}%{SPACE}%{NUMBER:plustime}%{SPACE}%{WORD:timezone}\]%{SPACE}(%{GREEDYDATA:info};%{SPACE}<io_obj%{SPACE}p:%{DATA:[io][obj_p]},%{SPACE}h:%{NUMBER:[io][handle]},%{SPACE}<TCP%{SPACE}'%{IP:[source][ip]}%{SPACE}:%{SPACE}%{NUMBER:[source][port]}'>,%{SPACE}<TCP%{SPACE}'%{IP:[destination][ip]}%{SPACE}:%{SPACE}%{NUMBER:[destination][port]}'>>,%{SPACE}%{WORD:[exception][class]}\(%{GREEDYDATA:[exception][message]},%{SPACE}duration:%{SPACE}%{TIME:[duration][time]}%{SPACE}\(%{DATA:[duration][format]}\)\)|%{GREEDYDATA:info})",
        "\[%{DATA:[originator][name]}@%{NUMBER:[originator][id]}%{SPACE}sub=%{DATA:subsystem}\]%{SPACE}(%{WORD:handler}\:%{SPACE}HTTP%{SPACE}method %{WORD:method}%{SPACE}not%{SPACE}supported%{SPACE}for%{SPACE}URI%{SPACE}%{URIPATHPARAM:uri}\.%{SPACE}Request%{SPACE}from%{SPACE}%{IP:[source][ip]}\.|%{GREEDYDATA:info})",
        "\-\-\>%{SPACE}\[context\]%{DATA:[base64][message]}\[\/context\]"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "clusterAgent" {
    mutate { add_tag => "esxi_grok_3.7" }
    grok {
      match => {
        "message" => [	 
        "%{WORD:[log][level]}%{SPACE}%{WORD:application}:%{SPACE}%{GREEDYDATA:[event][action]}\ \{%{HOSTNAME:[target][host]}\:%{NUMBER:[target][port]}%{SPACE}%{GREEDYDATA:[additional][info]}\}\.%{SPACE}Err%{SPACE}\:%{GREEDYDATA:[error][message]}\:%{SPACE}desc%{SPACE}\=%{SPACE}\"%{GREEDYDATA:[error][details]}\"\.%{SPACE}%{GREEDYDATA:status}",
        "%{WORD:[log][level]}%{SPACE}%{DATA:[event][info]}%{SPACE}\{%{GREEDYDATA:info}",
        "(%{PATH:[file][path]}\:%{INT:[file][line]}|%{DATA:[package][path]}\.%{WORD:[function][name]})"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "eam-access" {
    mutate { add_tag => "esxi_grok_3.8" }
    grok {
      match => {
        "message" => [	 
        "%{IP:[client][ip]}%{SPACE}\-%{SPACE}\-%{SPACE}\-%{SPACE}\[%{HTTPDATE:[event][original_time]}\]%{SPACE}\[%{DATA:thread}\]%{SPACE}\"%{WORD:method}%{SPACE}%{DATA:request}%{SPACE}HTTP/%{NUMBER:[http][version]}\"%{SPACE}%{NUMBER:[status][code]}%{SPACE}%{NUMBER:bytes}%{SPACE}\[Processing%{SPACE}time%{SPACE}%{NUMBER:[processing][time]}%{SPACE}msec\]%{SPACE}\"%{DATA:[user][agent]}\""
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "vpxd-main" {
    mutate { add_tag => "esxi_grok_3.9" }
    grok {
      match => {
        "message" => [	 
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{WORD:[log][level]}%{SPACE}%{DATA:application}\[%{NUMBER:[process][id]}\]%{SPACE}\[%{DATA:[originator][name]}\@%{NUMBER:[originator][id]}%{SPACE}sub=%{DATA:subsystem}%{SPACE}(opID=%{DATA:[operation][id]}|)\]%{SPACE}%{GREEDYDATA:message}",
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}-%{SPACE}time\sthe\sservice\swas\slast\sstarted\s%{TIMESTAMP_ISO8601:[time][started]},\sSection\sfor\sVMware\sVirtualCenter,\spid=%{INT:[process][id]},\sversion=%{DATA:version},\sbuild=%{NUMBER:build},\soption=%{WORD:option}"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "sps" {
    mutate { add_tag => "esxi_grok_3.10" }
    grok {
      match => {
        "message" => [
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}\[%{DATA:thread}\]%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}opId\=%{DATA:[operation][id]}\s%{DATA:[class][name]}%{SPACE}\-%{SPACE}%{GREEDYDATA:message}",
        "%{TIMESTAMP_ISO8601:[event][original_time]} %{DATA:eventprovider} - - - %{DATA:errorclass}: %{DATA:errornestedclass}: %{GREEDYDATA:message}",
        "%{TIMESTAMP_ISO8601:[event][original_time]} %{HOSTNAME:hostname} %{DATA:application} - - -\s*%{GREEDYDATA:message}",
        "%{GREEDYDATA:message}",
        "at\s%{DATA:[class][name]}\(%{DATA:[class][location]}\)\s(~)?\[%{DATA:[jar][info]}\]",
        # added on 15/08/2025
        "\.\.\.\s\d+\smore", # nonsense logs
        "%{DATA}:\s%{GREEDYDATA:[error][message]}"
	   ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "vpxd" {
    mutate { add_tag => "esxi_grok_3.11" }
    grok {
      match => {
        "message" => [
        "%{NUMBER:id}%{SPACE}-%{SPACE}-%{SPACE}%{SPACE}Event%{SPACE}\[%{NUMBER:[event][id]}\]%{SPACE}\[%{DATA:[event][type]}\]%{SPACE}\[%{TIMESTAMP_ISO8601:[event][original_time]}\]%{SPACE}\[%{DATA:[event][class]}\]%{SPACE}\[%{WORD:[log][level]}\]%{SPACE}\[%{DATA:[user][name]}\]%{SPACE}\[%{DATA:datacenter}\]%{SPACE}\[%{NUMBER:[event][reference]}\]%{SPACE}\[%{GREEDYDATA:message}\]?",
        "%{NUMBER:id}%{SPACE}-%{SPACE}-%{SPACE}%{SPACE}Event%{SPACE}\[%{NUMBER:[event][id]}\]%{SPACE}\[%{DATA:[event][type]}\]%{SPACE}%{GREEDYDATA:script_data}"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "envoy-access" {
    mutate { add_tag => "esxi_grok_3.12" }
    grok {
      match => {
        "message" => [
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{WORD:[log][level]}%{SPACE}%{DATA:application}\[%{NUMBER:[process][id]}\]%{SPACE}\[%{DATA:[originator][name]}\@%{NUMBER:[originator][id]}%{SPACE}sub=%{DATA:subsystem}\]%{SPACE}\[%{TIMESTAMP_ISO8601:[request][timestamp]}\]%{SPACE}\"%{WORD:method}%{SPACE}%{DATA:url}%{SPACE}HTTP/%{NUMBER:[http][version]}\"%{SPACE}%{NUMBER:[status][code]}%{SPACE}-%{SPACE}%{NUMBER:[response][flags]}%{SPACE}%{NUMBER:[response][size]}%{SPACE}%{NUMBER:[request][duration]}%{SPACE}-%{SPACE}\"-\"%{SPACE}\"%{DATA:[user][agent]}\"%{SPACE}\"-\"%{SPACE}\"%{DATA:[upstream][host]}\"%{SPACE}\"-\"",
        "%{DATA:process.name} - - - %{GREEDYDATA:message}"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "vapi-endpoint-access" {
    mutate { add_tag => "esxi_grok_3.13" }
    grok {
      match => {
        "message" => [
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}\|%{SPACE}%{DATA:thread}%{SPACE}\|%{SPACE}%{UUID:[request][id]}%{SPACE}\|%{SPACE}((%{IP:[client][ip]}%{SPACE}-%{SPACE}-%{SPACE}\[%{HTTPDATE:[request][time]}\]%{SPACE}\"%{WORD:method}%{SPACE}%{DATA:url}%{SPACE}HTTP/%{NUMBER:[http][version]}\"%{SPACE}%{NUMBER:[status][code]}%{SPACE}%{NUMBER:[response][size]}%{SPACE}\"-\"%{SPACE}\"%{DATA:[user][agent]}\"%{SPACE}%{NUMBER:[request][duration]})|(%{GREEDYDATA:[message]}))",
        # added on 15/08/2025
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}\|%{SPACE}%{DATA:thread}%{SPACE}\|%{SPACE}\|%{SPACE}((%{IP:[client][ip]}%{SPACE}-%{SPACE}-%{SPACE}\[%{HTTPDATE:[request][time]}\]%{SPACE}\"%{WORD:method}%{SPACE}%{DATA:url}%{SPACE}HTTP/%{NUMBER:[http][version]}\"%{SPACE}%{NUMBER:[status][code]}%{SPACE}%{NUMBER:[response][size]}%{SPACE}\"-\"%{SPACE}\"%{DATA:[user][agent]}\"%{SPACE}%{NUMBER:[request][duration]})|(%{GREEDYDATA:[message]}))"
        ] 
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "cis-license" {
    mutate { add_tag => "esxi_grok_3.14" }
    grok {
      match => {
        "message" => [
        #upgraded on 07/08/2025. Still work to do
        "(fileVersion\:%{SPACE}%{GREEDYDATA:[file][version]})|((?:license:\s%{SPACE}%{DATA:[license]}%{SPACE})?name\:%{SPACE}%{GREEDYDATA:[name]})|(version\:%{SPACE}%{GREEDYDATA:[version]})|(scopeId:%{SPACE}%{GREEDYDATA:[scope][id]})|(productId:%{SPACE}\'%{GREEDYDATA:[product][id]}\')|(cost:%{SPACE}\[%{GREEDYDATA:[cost]}\])|(instanceId:%{SPACE}%{GREEDYDATA:[instance][id]})|(inUse:%{SPACE}\[%{GREEDYDATA:[in][use]}\])|(product:%{SPACE}\{%{GREEDYDATA:[product]}\})",
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{DATA:[thread][name]}\s%{SPACE}%{LOGLEVEL:[log][level]}\s%{SPACE}%{DATA:[class][name]}\s%{SPACE}%{GREEDYDATA:[message]}",
        # updated on 15/08/2025. These changes capture code
        "({?(?<[esxi][host]>host-\d+),?)?(\W?(scope:\s)?(?<scope>[a-f0-9\-]{36}),?)?(\|wcp(\slicensed:\s(?<licensed>\w+))?\W*)?",
        "(consentAccepted\s=\s%{WORD:[consent][accepted]},)?(consentId\s=\s%{NUMBER:[consent][id]},)?(consentConfigurations\s=\s\(%{DATA:[consent][configurations]}\))?(owner\s=\s%{GREEDYDATA:owner})?(dynamicType\s=\s%{DATA:[dynamic][type]},)?(dynamicProperty\s=\s%{DATA:[dynamic][property]},)?(version\s=\s%{NUMBER:[config][version]})?(\{?urn:vri:com\.vmware\.license\.asset:%{DATA:[esxi][host_id]}-%{UUID:uuid}\}?)?(cost:\s%{INT:cost})?",
        "\((?<[consent][configurations]>\w+\.\w+\.\w+)\)\s{",
        # this pattern matches unuseful symbols in log
        "\W+"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "vum-vmacore" {
    mutate { add_tag => "esxi_grok_3.15" }
    grok {
      match => {
        "message" => [
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{WORD:[log][level]}%{SPACE}%{DATA:application}\[%{NUMBER:[process][id]}\]%{SPACE}\[%{DATA:[originator][name]}\@%{NUMBER:[originator][id]}%{SPACE}sub=%{DATA:subsystem}\]\ %{GREEDYDATA:[error][message]}(|;%{GREEDYDATA:[additional][info]})",
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}-%{SPACE}time%{SPACE}the%{SPACE}service%{SPACE}was%{SPACE}last%{SPACE}started %{TIMESTAMP_ISO8601:[service][started]},%{SPACE}Section%{SPACE}for%{SPACE}%{DATA:section},%{SPACE}pid=%{INT:pid},%{SPACE}version=%{DATA:version},%{SPACE}build=%{INT:build},%{SPACE}option=%{WORD:option}",
        "%{TIMESTAMP_ISO8601:[event][original_time]} %{HOSTNAME:hostname} %{DATA:application}- - -\s+%{GREEDYDATA:message}",
         # pattern below can be too generic
        "-->\s%{GREEDYDATA:[error][message]}",
        # added on 15/08/2025
        ">\s\[context\]%{DATA:[base64][context]}\[\/context\]",
        ">\sbacktrace\[%{INT}\]\s%{GREEDYDATA:[backtrace][message]}",
        ">",
        # keep always last
        ">\s\s+(?<part_of_code>.+)"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "analytics" {
    mutate { add_tag => "esxi_grok_3.16" }
    grok {
      match => {
        "message" => [
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{DATA:application}\s%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}%{DATA:[class][name]}\s%{GREEDYDATA:[message]}",
        ">{\"timestamp\":%{NUMBER:[error][timestamp]},\"status\":%{NUMBER:[error][status]},\"error\":\"%{DATA:[error][title]}\",\"message\":\"%{DATA:[error][message]}\",\"path\":\"%{PATH:[error][path]}\"}.",
        "{%TIMESTAMP_ISO8601:timestamp}\s%{HOSTNAME:hostname}\s%{DATA:application} \-? \-? \-?%{SPACE}\.?\.?\.?%{SPACE}%{GREEDYDATA:message}",
        "Caused\sby:\s%{DATA:[class][name]}:\s%{GREEDYDATA:message}",
        # added on 22/08/2025
        "at\s%{DATA:[class][name]}\(%{DATA:[class][location]}\)",
        "\.\.\.\s\d+\smore", # nonsense logs
        # keep always last
        ">\s\s+(?<part_of_code>.+)"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "wcpsvc" {
    mutate { add_tag => "esxi_grok_3.17" }
    grok {
      match => {
        "message" => [
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}%{WORD:[application]}%{SPACE}\[%{DATA:file_and_line}\]%{SPACE}(?:\[opID=%{DATA:[op][id]}\]%{SPACE})?%{GREEDYDATA:[message]}",	 
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}%{WORD:application}%{SPACE}\[%{DATA:file_and_line}\]%{SPACE}%{GREEDYDATA:message}:%{SPACE}\[\{Hostname:%{IP:[host][ip]}%{SPACE}Port:%{NUMBER:[host][port]}%{SPACE}Protocol:%{WORD:protocol}\}\]",
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{DATA:application}%{SPACE}- - - %{GREEDYDATA:message}"
        ]
      }
    }
  } else if [label][device_type] == "esxi_host" and [event][provider] == "ui-main" {
    mutate { add_tag => "esxi_grok_3.18" }
    grok {
      match => {
        "message" => [
        "\[%{TIMESTAMP_ISO8601:[event][original_time]}\]%{SPACE}\[%{LOGLEVEL:[log][level]}%{SPACE}\]%{SPACE}%{DATA:thread} %{SPACE}(?:%{NUMBER:[session][id_1]} )?(?:%{NUMBER:[session][id_2]} )?(?:######%{SPACE})?%{HOSTNAME:[class][name]} %{SPACE}%{GREEDYDATA:message}",
        "Updated%{SPACE}extensions\:%{SPACE}%{GREEDYDATA:[updated][extentions]}",
        "Deleted\sextensions:\s%{GREEDYDATA:[deleted][extensions]}",
        "%{TIMESTAMP_ISO8601:[event][original_time]}%{SPACE}%{DATA:[application}%{SPACE}- - - %{SPACE}...%{SPACE}%{GREEDYDATA:[message]}",
        "%{TIMESTAMP_ISO8601:[event][original_time]} %{HOSTNAME:host.name} %{DATA:process.name} - - -\s+%{GREEDYDATA:message}",   
        "at\s+%{GREEDYDATA:message}",
